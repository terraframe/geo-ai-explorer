<div class="explorer-root"
     [ngClass]="{
       'layout-full-chat': workflowStep === WorkflowStep.FullScreenChat,
       'layout-ai-results': workflowStep === WorkflowStep.AiChatAndResults,
       'layout-map-results': workflowStep === WorkflowStep.MapAndResults,
       'layout-disambiguate': workflowStep === WorkflowStep.DisambiguateObject,
       'layout-min-chat': workflowStep === WorkflowStep.MinimizeChat,
       'layout-inspect': workflowStep === WorkflowStep.InspectObject || workflowStep === WorkflowStep.ViewNeighbors
     }">

  <p-toast position="top-center" key="explorer" />

  <div *ngIf="loading" class="spinner-overlay">
    <p-progress-spinner ariaLabel="loading" />
  </div>

  <!-- Chat -->
  <section class="chat-panel"
           *ngIf="
             workflowStep === WorkflowStep.FullScreenChat ||
             workflowStep === WorkflowStep.AiChatAndResults ||
             workflowStep === WorkflowStep.MinimizeChat
           ">

    <aichat [class.small-ai-chat]="workflowStep === WorkflowStep.MinimizeChat"></aichat>
  </section>

  <section class="inspector" *ngIf="(workflowStep === WorkflowStep.InspectObject || workflowStep === WorkflowStep.DisambiguateObject) && selectedObject">
      <div class="horizontal-layout inspector-controls">
          <p-button severity="secondary"
                      pTooltip="Go Back"
                      (onClick)="goBack()">
              <fa-icon [icon]="backIcon"></fa-icon>
              <label style="cursor: pointer;">Back</label>
          </p-button>

          <ng-container *ngIf="(previousWorkflowStep$ | async) === WorkflowStep.DisambiguateObject">
            <h2>Select An Object</h2>

            <p-button severity="secondary"
                      pTooltip="Use the selected object to resolve the ambiguity"
                      (onClick)="disambiguate()"
                      [disabled]="selectedObject == null">
              <label>Select</label>
              <fa-icon [icon]="forwardIcon"></fa-icon>
            </p-button>
          </ng-container>
      </div>

      <!-- Old minimize code. Hanging around just in-case we want it back -->
      <!--
      <div class="min-max">
        <p-button *ngIf="!chatMinimized"
                  severity="secondary"
                  pTooltip="Minimize"
                  (onClick)="minimizeChat()">
          <fa-icon [icon]="minimizeIcon"></fa-icon>
        </p-button>

        <p-button *ngIf="chatMinimized"
                  severity="secondary"
                  pTooltip="Maximize"
                  (onClick)="minimizeChat()">
          <fa-icon [icon]="upsizeIcon"></fa-icon>
        </p-button>
      </div>
      -->

    <div id="graphExplorerContainer">
      <h2 class="inspector-title">
        {{ selectedObject.properties.label }}
      </h2>

      <p-tabs [(value)]="activeTab">
        <p-tablist>
          <p-tab value="0">Attributes</p-tab>
          <p-tab value="1">Relationships</p-tab>
        </p-tablist>

        <p-tabpanels>
          <p-tabpanel value="0">
            <attribute-panel *ngIf="selectedObject"></attribute-panel>
          </p-tabpanel>

          <p-tabpanel value="1">
            <graph-explorer *ngIf="activeTab === '1'"
                            #graphExplorer
                            [explorer]="this">
            </graph-explorer>
          </p-tabpanel>
        </p-tabpanels>
      </p-tabs>
    </div>
  </section>

  <!-- Map -->
  <section class="map-panel"
           *ngIf="
             workflowStep === WorkflowStep.MapAndResults ||
             workflowStep === WorkflowStep.DisambiguateObject ||
             workflowStep === WorkflowStep.MinimizeChat ||
             workflowStep === WorkflowStep.InspectObject ||
             workflowStep === WorkflowStep.ViewNeighbors
           ">

    <div id="map"></div>
  </section>

  <!-- Results / Disambiguation Body -->
  <section class="results-panel"
           *ngIf="
             workflowStep === WorkflowStep.AiChatAndResults ||
             workflowStep === WorkflowStep.MapAndResults ||
             workflowStep === WorkflowStep.DisambiguateObject ||
             workflowStep === WorkflowStep.MinimizeChat ||
             workflowStep === WorkflowStep.ViewNeighbors
           ">
    <!-- Disambiguation Header -->
  <div id="disambiguate-header"
        class="horizontal-layout"
        *ngIf="workflowStep === WorkflowStep.DisambiguateObject">

      <p-button severity="secondary"
                pTooltip="Back to AI Chat"
                (onClick)="cancelDisambiguation()">
        <fa-icon [icon]="backIcon"></fa-icon>
        <label>Cancel</label>
      </p-button>

      <h2>Select An Object</h2>

      <p-button severity="secondary"
                pTooltip="Use the selected object to resolve the ambiguity"
                (onClick)="disambiguate()"
                [disabled]="selectedObject == null">
        <label>Select</label>
        <fa-icon [icon]="forwardIcon"></fa-icon>
      </p-button>
    </div>

    <ng-container>
      <results-table></results-table>
    </ng-container>
  </section>

  <!-- Legend -->
  <p-panel *ngIf="
             workflowStep === WorkflowStep.MapAndResults ||
             workflowStep === WorkflowStep.MinimizeChat ||
             workflowStep === WorkflowStep.InspectObject ||
             workflowStep === WorkflowStep.ViewNeighbors
           "
           [toggleable]="true"
           header="Layers"
           collapsed="true"
           class="legend">

    <ng-container *ngIf="orderedTypes.length > 0">
      <div cdkDropList (cdkDropListDropped)="drop($event)">
        <div class="legend-item horizontal-layout"
             *ngFor="let type of orderedTypes"
             cdkDrag>

          <ng-container *ngIf="typeLegend[type] as legend">
            <p-checkbox binary="true"
                        [ngModel]="legend.visible"
                        [inputId]="legend.label"
                        (onChange)="toggleTypeLegend(legend)" />

            <div class="square"
                 [ngStyle]="{ background: legend.color }">
            </div>

            <label>{{ legend.label }}</label>
          </ng-container>
        </div>
      </div>
    </ng-container>

    <hr class="legend-divider">

    <h4>Context Layers</h4>

    <div>
      <div class="legend-item horizontal-layout"
           *ngFor="let layer of vectorLayers$ | async">

        <p-checkbox binary="true"
                    [ngModel]="layer.enabled"
                    [inputId]="layer.id"
                    (onChange)="toggleVectorLayer(layer)" />

        <div class="square"
             [ngStyle]="{ background: layer.color }">
        </div>

        <label [for]="layer.id" class="ml-2">
          {{ layer.label }}
        </label>
      </div>
    </div>
  </p-panel>
</div>
